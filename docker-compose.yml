# ─────────────────────────────────────────────────────────────
# Asset Dashboard  —  Docker Compose
# Services: API (Python/FastAPI) + PostgreSQL + Grafana
# ─────────────────────────────────────────────────────────────
version: "3.9"

services:
  # ── Python API ───────────────────────────────────────────────
  api:
    build: .
    container_name: asset_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://asset:asset@postgres:5432/asset_db
      FETCH_INTERVAL: 300
    volumes:
      - dashboard_json:/app/grafana/dashboards
      - ./app/plugins:/app/app/plugins
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: asset_postgres
    environment:
      POSTGRES_USER: asset
      POSTGRES_PASSWORD: asset
      POSTGRES_DB: asset_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asset"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Grafana ──────────────────────────────────────────────────
  grafana:
    image: grafana/grafana-oss:10.3.1
    container_name: asset_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: yesoreyeram-infinity-datasource
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - dashboard_json:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
  grafana_data:
  dashboard_json:
