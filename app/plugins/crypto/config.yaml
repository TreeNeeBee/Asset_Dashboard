# ─────────────────────────────────────────────────────────────
# Cryptocurrency Plugin Configuration
# ─────────────────────────────────────────────────────────────

# Plugin metadata
key: "crypto"
name: "Cryptocurrency"
category: "crypto"
description: "Cryptocurrency prices via CoinGecko free API (BTC, ETH, SOL …)"
version: "1.0.0"

# Grafana panel display
panel_title_prefix: "Crypto"
close_column_label: "Close"

# Fetch interval in milliseconds (minimum: 1ms)
fetch_interval_ms: 60000

# Data source settings
source:
  name: "CoinGecko Crypto"
  provider: "crypto_coingecko"
  base_url: "https://api.coingecko.com/api/v3"
  description: "Cryptocurrency prices via CoinGecko free API"

# API key file path (empty = no key needed)
api_key_file: ""

# Tracked assets
assets:
  - symbol: "BTC"
    display_name: "Bitcoin"
  - symbol: "ETH"
    display_name: "Ethereum"
  - symbol: "SOL"
    display_name: "Solana"
